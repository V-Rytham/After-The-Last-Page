services:
  # Backend API + Socket.IO
  - type: web
    name: alp-api
    runtime: node
    plan: starter
    buildCommand: npm ci --prefix backend
    startCommand: node backend/index.js
    healthCheckPath: /api/health
    envVars:
      - key: PORT
        value: 5000
      - key: MONGODB_URI
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: CLIENT_URL
        sync: false
      - key: BOOKFRIEND_SERVER_URL
        sync: false
      - key: QUIZ_QUESTION_ENGINE_URL
        value: https://deterministic-question-engine-3sd2.onrender.com
      - key: QUIZ_PASS_THRESHOLD_PERCENT
        value: 60

  # BookFriend Agent (RAG) service
  - type: web
    name: alp-bookfriend
    runtime: node
    plan: starter
    buildCommand: npm ci --prefix bookfriend-server
    startCommand: node bookfriend-server/server.js
    healthCheckPath: /health
    envVars:
      - key: PORT
        value: 5050
      - key: MONGODB_URI
        sync: false
      - key: BOOKFRIEND_LLM_PROVIDER
        value: groq
      - key: BOOKFRIEND_GROQ_MODEL
        value: llama-3.1-8b-instant
      - key: GROQ_API_KEY
        sync: false

  # Frontend (Vite build) as a Render Static Site
  - type: web
    name: alp-web
    runtime: static
    buildCommand: npm ci && npm run build
    staticPublishPath: frontend/dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        sync: false
      - key: VITE_SOCKET_URL
        sync: false
